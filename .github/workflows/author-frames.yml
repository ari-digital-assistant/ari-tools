name: Author corpus frames

# Draft frame/slot banks for one skill and open a PR for review.
# The draft is LLM-generated by author-frames.py under a fixed prompt
# contract; a human (native speaker, for Italian) reviews the PR, renames
# the draft- files, and merges. The training pipeline ignores draft-* files.

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill id (e.g. dev.heyari.timer, or a builtin like open)'
        required: true
      locale:
        description: 'Locale (en|it)'
        required: true
        default: 'en'

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Clone ari-skills
        run: git clone --depth 1 https://github.com/ari-digital-assistant/ari-skills.git /tmp/skills

      - name: Install Rust (builtin skills need export-utterances)
        if: ${{ !startsWith(github.event.inputs.skill, 'dev.') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Clone ari-engine (builtin skills only)
        if: ${{ !startsWith(github.event.inputs.skill, 'dev.') }}
        run: git clone --depth 1 https://github.com/ari-digital-assistant/ari-engine.git /tmp/engine

      - name: Draft the banks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARI_SKILLS_DIR: /tmp/skills
          ARI_ENGINE_DIR: /tmp/engine
        run: |
          python3 functiongemma/author-frames.py \
            --skill "${{ github.event.inputs.skill }}" \
            --locale "${{ github.event.inputs.locale }}"

      - name: Push draft branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="frames/${{ github.event.inputs.skill }}-${{ github.event.inputs.locale }}"
          git config user.name "ari-frames-bot"
          git config user.email "bot@heyari.dev"
          git checkout -B "$BRANCH"
          git add functiongemma/corpus/draft-*
          git commit -m "draft(corpus): frame bank for ${{ github.event.inputs.skill }} (${{ github.event.inputs.locale }})"
          git push -f origin "$BRANCH"
          # Deliberately NOT `gh pr create`: this repo (like most, by default)
          # forbids GitHub Actions from opening pull requests, and enabling
          # that org-wide setting to save one click is a poor trade. The
          # branch is pushed; the link below opens the PR form pre-filled.
          {
            echo "### Frame bank drafted: \`${{ github.event.inputs.skill }}\` (${{ github.event.inputs.locale }})"
            echo ""
            echo "Branch \`$BRANCH\` pushed. [Open a PR](${{ github.server_url }}/${{ github.repository }}/compare/$BRANCH?expand=1)"
            echo ""
            echo "Review, drop the \`draft-\` prefix (merging slots as appropriate), then merge."
            echo "Draft files are ignored by training until renamed. Italian needs native review."
          } >> "$GITHUB_STEP_SUMMARY"
