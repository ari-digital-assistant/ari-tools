name: Author corpus frames

# Draft frame/slot banks for one skill and open a PR for review.
# The draft is LLM-generated by author-frames.py under a fixed prompt
# contract; a human (native speaker, for Italian) reviews the PR, renames
# the draft- files, and merges. The training pipeline ignores draft-* files.

on:
  workflow_dispatch:
    inputs:
      skill:
        description: 'Skill id (e.g. dev.heyari.timer, or a builtin like open)'
        required: true
      locale:
        description: 'Locale (en|it)'
        required: true
        default: 'en'

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Clone ari-skills
        run: git clone --depth 1 https://github.com/ari-digital-assistant/ari-skills.git /tmp/skills

      - name: Install Rust (builtin skills need export-utterances)
        if: ${{ !startsWith(github.event.inputs.skill, 'dev.') }}
        uses: dtolnay/rust-toolchain@stable

      - name: Clone ari-engine (builtin skills only)
        if: ${{ !startsWith(github.event.inputs.skill, 'dev.') }}
        run: git clone --depth 1 https://github.com/ari-digital-assistant/ari-engine.git /tmp/engine

      - name: Draft the banks
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARI_SKILLS_DIR: /tmp/skills
          ARI_ENGINE_DIR: /tmp/engine
        run: |
          python3 functiongemma/author-frames.py \
            --skill "${{ github.event.inputs.skill }}" \
            --locale "${{ github.event.inputs.locale }}"

      - name: Push draft branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="frames/${{ github.event.inputs.skill }}-${{ github.event.inputs.locale }}"
          git config user.name "ari-frames-bot"
          git config user.email "bot@heyari.dev"
          git checkout -B "$BRANCH"
          git add functiongemma/corpus/draft-*
          git commit -m "draft(corpus): frame bank for ${{ github.event.inputs.skill }} (${{ github.event.inputs.locale }})"
          git push -f origin "$BRANCH"
          # Requires the org + repo setting "Allow GitHub Actions to create and
          # approve pull requests" (enabled 2026-07-20). If that is ever turned
          # off again this step fails with a 'not permitted' GraphQL error —
          # the branch is already pushed at that point, so the fallback is
          # simply to open the PR by hand from the link below.
          gh pr create \
            --title "Frame bank draft: ${{ github.event.inputs.skill }} (${{ github.event.inputs.locale }})" \
            --body "LLM-drafted via \`author-frames.py\` under the prompt contract in \`functiongemma/corpus/README.md\`.

          Review, drop the \`draft-\` prefix (merging slots as appropriate), then merge — the
          expander ignores \`draft-*\` files, so nothing trains on this until renamed.
          Italian requires native-speaker review.

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || {
              echo "::warning::PR creation refused — branch \`$BRANCH\` is pushed, open it manually"
              echo "[Open a PR](${{ github.server_url }}/${{ github.repository }}/compare/$BRANCH?expand=1)" >> "$GITHUB_STEP_SUMMARY"
            }
