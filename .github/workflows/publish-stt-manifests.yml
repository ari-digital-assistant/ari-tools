name: Publish STT manifests

# Polls Hugging Face daily for each STT bundle and republishes the
# floating-release manifest if any component file has changed. Bundle
# manifest format: top-level `version` covers the set, with per-file
# `name`/`url`/`sha256`/`size_bytes` entries.

on:
  schedule:
    - cron: '30 1 * * *'   # 01:30 UTC daily — staggered after the LLM job
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1    # serialise so the models don't burst HF's per-IP
                         # rate-limit in the same second (429s); dedup makes
                         # back-to-back runs near-free anyway
      matrix:
        model:
          - id: kroko
            hf_repo: csukuangfj/sherpa-onnx-streaming-zipformer-en-kroko-2025-08-06
            files: encoder.onnx,decoder.onnx,joiner.onnx,tokens.txt
          - id: nemotron
            hf_repo: csukuangfj/sherpa-onnx-nemotron-speech-streaming-en-0.6b-int8-2026-01-14
            files: encoder.int8.onnx,decoder.int8.onnx,joiner.int8.onnx,tokens.txt
          - id: whisper-turbo
            hf_repo: csukuangfj/sherpa-onnx-whisper-turbo
            # Whisper is encoder-decoder, no joiner. int8 quantised
            # variants of the encoder and decoder; tokens.txt is the
            # 52k-entry BPE vocabulary covering all 99 supported
            # languages. Total ~1 GB on disk.
            files: turbo-encoder.int8.onnx,turbo-decoder.int8.onnx,turbo-tokens.txt
    steps:
      - name: Silence git default-branch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Publish if upstream changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 scripts/publish_manifest.py stt-bundle \
            --hf-repo "${{ matrix.model.hf_repo }}" \
            --hf-files "${{ matrix.model.files }}" \
            --release-tag "stt-${{ matrix.model.id }}-latest"
