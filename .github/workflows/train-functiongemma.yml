name: Train FunctionGemma

on:
  # Nightly at midnight UTC
  schedule:
    - cron: '0 0 * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      force:
        description: 'Force training even if no skill changes detected'
        required: false
        default: 'false'
      tools_ref:
        description: 'ari-tools branch to train from (default: main)'
        required: false
        default: 'main'
      experimental:
        description: 'Experimental run — train + routing-eval ONLY. Never releases, never stores training SHAs, never publishes to devices.'
        required: false
        default: 'false'
      locale:
        description: 'Restrict to one locale (en|it). Empty = both (the nightly default).'
        required: false
        default: ''

permissions:
  contents: write   # `gh release create` + `gh release upload` + push drafted banks
  issues: write     # queue auto-drafted Italian banks for native review

jobs:
  configure:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Compute locale matrix
        id: set
        run: |
          LOCALE="${{ github.event.inputs.locale }}"
          EN='{"locale":"en","eval_file":"functiongemma/routing-eval.jsonl"}'
          IT='{"locale":"it","eval_file":"functiongemma/routing-eval.it.jsonl"}'
          case "$LOCALE" in
            "")  echo "matrix={\"include\":[$EN,$IT]}" >> "$GITHUB_OUTPUT" ;;
            en)  echo "matrix={\"include\":[$EN]}" >> "$GITHUB_OUTPUT" ;;
            it)  echo "matrix={\"include\":[$IT]}" >> "$GITHUB_OUTPUT" ;;
            *)   echo "unknown locale: $LOCALE" >&2; exit 1 ;;
          esac

  train:
    needs: configure
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.configure.outputs.matrix) }}
    steps:
      - name: Silence git default-branch hint
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v5

      - name: Check for skill changes since last training
        id: check
        run: |
          set -e
          ENGINE_SHA=$(git ls-remote https://github.com/ari-digital-assistant/ari-engine.git HEAD | cut -f1)
          git clone --depth 50 --filter=blob:none --sparse \
            https://github.com/ari-digital-assistant/ari-engine.git /tmp/engine
          cd /tmp/engine
          git sparse-checkout set crates/ari-skills/src
          ENGINE_SKILLS_SHA=$(git log -1 --format=%H -- crates/ari-skills/src/)
          cd -

          git clone --depth 50 --filter=blob:none --sparse \
            https://github.com/ari-digital-assistant/ari-skills.git /tmp/skills
          cd /tmp/skills
          git sparse-checkout set skills/
          SKILLS_SHA=$(git log -1 --format=%H -- skills/)
          cd -

          echo "engine_skills_sha=$ENGINE_SKILLS_SHA" >> "$GITHUB_OUTPUT"
          echo "skills_sha=$SKILLS_SHA" >> "$GITHUB_OUTPUT"

          # Per-locale stored SHAs — each locale tracks its own last training.
          STORED_ENGINE=""
          STORED_SKILLS=""
          if pip install -q modal && \
             modal volume get ari-functiongemma-output "last-trained-${{ matrix.locale }}.json" /tmp/last-trained.json 2>/dev/null; then
            STORED_ENGINE=$(python3 -c "import json; print(json.load(open('/tmp/last-trained.json')).get('engine_skills_sha',''))")
            STORED_SKILLS=$(python3 -c "import json; print(json.load(open('/tmp/last-trained.json')).get('skills_sha',''))")
          fi

          echo "Locale: ${{ matrix.locale }}"
          echo "Stored engine SHA: $STORED_ENGINE  Current: $ENGINE_SKILLS_SHA"
          echo "Stored skills SHA: $STORED_SKILLS  Current: $SKILLS_SHA"

          FORCE="${{ github.event.inputs.force || 'false' }}"
          if [[ "$FORCE" == "true" ]]; then
            echo "Force flag set — training will run."
            echo "should_train=true" >> "$GITHUB_OUTPUT"
          elif [[ "$ENGINE_SKILLS_SHA" != "$STORED_ENGINE" || "$SKILLS_SHA" != "$STORED_SKILLS" ]]; then
            echo "Skill changes detected — training will run."
            echo "should_train=true" >> "$GITHUB_OUTPUT"
          else
            echo "No skill changes since last training — skipping."
            echo "should_train=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}

      - name: Set up Python
        if: steps.check.outputs.should_train == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Modal
        if: steps.check.outputs.should_train == 'true'
        run: pip install modal

      # ── Corpus banks: keep them in step with the skills ────────────────
      # A skill whose banks are missing or stale trains the router on a
      # stale idea of what it does — and a bankless skill hard-errors the
      # generator outright. Rather than failing the nightly and waiting for
      # a human, draft the banks, activate them, and carry on. The
      # promotion gate is the safety net: bad banks produce a model that
      # fails Gate v3 and publishes nothing.
      - name: Detect stale or missing corpus banks
        id: banks
        if: steps.check.outputs.should_train == 'true'
        env:
          ARI_ENGINE_DIR: /tmp/engine-full
          ARI_SKILLS_DIR: /tmp/skills
        run: |
          # check_banks needs the real skill sources, not the sparse
          # checkouts the change-detection step made.
          git clone --depth 1 https://github.com/ari-digital-assistant/ari-engine.git /tmp/engine-full
          cd functiongemma
          python3 check_banks.py --locale ${{ matrix.locale }} --github-output

      - name: Draft banks for changed skills
        if: steps.check.outputs.should_train == 'true' && steps.banks.outputs.has_drift == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARI_ENGINE_DIR: /tmp/engine-full
          ARI_SKILLS_DIR: /tmp/skills
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Banks are stale for: ${{ steps.banks.outputs.needs_drafting }}"
            echo "::error::OPENAI_API_KEY is not set, so they cannot be drafted."
            echo "::error::Add the secret, or draft manually with author-frames.py."
            exit 1
          fi
          cd functiongemma
          IFS=',' read -ra SKILLS <<< "${{ steps.banks.outputs.needs_drafting }}"
          for S in "${SKILLS[@]}"; do
            echo "── drafting banks for $S (${{ matrix.locale }}) ──"
            python3 author-frames.py --skill "$S" --locale ${{ matrix.locale }} --apply
          done
          # Prove the corpus still builds BEFORE anything is committed or a
          # GPU-second is spent. Catches a malformed draft immediately.
          python3 generate-dataset.py --locale ${{ matrix.locale }} \
            --augment corpus > /dev/null
          python3 check_banks.py --locale ${{ matrix.locale }} --record

      - name: Commit drafted banks
        if: steps.check.outputs.should_train == 'true' && steps.banks.outputs.has_drift == 'true'
        run: |
          git config user.name "ari-frames-bot"
          git config user.email "bot@heyari.dev"
          git add functiongemma/corpus/
          git commit -m "chore(corpus): auto-draft banks for ${{ steps.banks.outputs.needs_drafting }} (${{ matrix.locale }})

          Drafted by author-frames.py because these skills were added or their
          description/parameters/examples changed since the banks were last
          written. Machine-authored: review at leisure — the promotion gate,
          not this commit, is what decides whether the resulting model ships.

          Workflow run: ${{ github.run_id }}"
          # Both locales' jobs can land here at once (they touch different
          # files, so a rebase resolves cleanly) — retry rather than lose
          # the drafted banks to a push race.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin HEAD:main && break
            echo "push race (attempt $i), retrying..."
            sleep $((RANDOM % 10 + 5))
          done

      # Auto-committed Italian is machine-drafted; Keith reviews Italian by
      # standing project rule. The commit is not blocked on that review (the
      # gate decides shipping), but the debt must be VISIBLE rather than
      # accumulating silently — so file it as a review queue.
      - name: Queue Italian banks for native review
        if: >-
          steps.check.outputs.should_train == 'true'
          && steps.banks.outputs.has_drift == 'true'
          && matrix.locale == 'it'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Review auto-drafted Italian banks: ${{ steps.banks.outputs.needs_drafting }}" \
            --label "italian-review" \
            --body "The nightly auto-drafted Italian corpus banks for:

          \`${{ steps.banks.outputs.needs_drafting }}\`

          These are machine-written and already committed to \`main\` (training
          data, never user-facing text — the promotion gate decides what ships).
          They are live in the corpus now; this issue is a review queue, not a
          blocker.

          Look at \`functiongemma/corpus/frames.auto.it.json\` for idiomatic
          Italian: natural spoken phrasing, correct accents, nothing a real
          person wouldn't say to an assistant. Edit in place and commit — no
          need to re-draft.

          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || echo "::warning::could not open review issue (label missing?) — banks are still committed"

      - name: Train on Modal
        if: steps.check.outputs.should_train == 'true'
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: modal run functiongemma/modal_train.py --locale ${{ matrix.locale }} --tools-ref "${{ github.event.inputs.tools_ref || 'main' }}"

      - name: Upload GGUF as artifact
        if: steps.check.outputs.should_train == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ari-functiongemma-${{ matrix.locale }}-q4_k_m
          path: output/ari-functiongemma-${{ matrix.locale }}-q4_k_m.gguf

      - name: Install publish-manifest deps
        if: steps.check.outputs.should_train == 'true'
        run: pip install requests

      - name: Compute version + asset URL
        id: manifest
        if: steps.check.outputs.should_train == 'true'
        run: |
          set -e
          VERSION="$(date -u +%Y.%m.%d)-r${{ github.run_number }}"
          TAG="functiongemma-${{ matrix.locale }}-$VERSION"
          GGUF_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/ari-functiongemma-${{ matrix.locale }}-q4_k_m.gguf"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "gguf_url=$GGUF_URL" >> "$GITHUB_OUTPUT"

      - name: Create versioned release with GGUF
        # Archival release for every non-experimental run of either locale — this
        # is NOT device-facing (the floating manifest is). Italian models are
        # archived here even before promotion, so they can be inspected/downloaded.
        if: steps.check.outputs.should_train == 'true' && github.event.inputs.experimental != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.manifest.outputs.tag }}" \
            output/ari-functiongemma-${{ matrix.locale }}-q4_k_m.gguf \
            --repo ${{ github.repository }} \
            --title "FunctionGemma ${{ matrix.locale }} ${{ steps.manifest.outputs.version }}" \
            --notes "Retrain (${{ matrix.locale }}). Engine skills SHA: ${{ steps.check.outputs.engine_skills_sha }} · Community skills SHA: ${{ steps.check.outputs.skills_sha }} · Workflow run: ${{ github.run_id }}"

      # ── Promotion gate ──────────────────────────────────────────────────
      - name: Check out ari-engine (eval harness)
        if: steps.check.outputs.should_train == 'true'
        uses: actions/checkout@v5
        with:
          repository: ari-digital-assistant/ari-engine
          path: _ari-engine

      - name: Set up Rust
        if: steps.check.outputs.should_train == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        if: steps.check.outputs.should_train == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: _ari-engine

      - name: Install llama.cpp build deps
        if: steps.check.outputs.should_train == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y cmake clang libclang-dev
          LIBCLANG_DIR="$(dirname "$(find /usr/lib /usr/lib64 -name 'libclang*.so*' 2>/dev/null | head -1)")"
          echo "Found libclang in: $LIBCLANG_DIR"
          echo "LIBCLANG_PATH=$LIBCLANG_DIR" >> "$GITHUB_ENV"

      - name: Routing-eval promotion gate
        if: steps.check.outputs.should_train == 'true'
        run: |
          # --skills-dir points at the ari-skills checkout the "Check for skill
          # changes" step already made (sparse-checkout of skills/). Without it
          # the gate's keyword-pollution guardrail sees only the six built-ins,
          # while the training filter sees the community patterns too — the two
          # would disagree about what a keyword-hit is, and any eval case a
          # community pattern claims would silently inflate the score that
          # promotes this model to real devices.
          cd _ari-engine
          cargo run --release -p ari-ffi --bin route-eval -- \
            --locale ${{ matrix.locale }} \
            --skills-dir /tmp/skills/skills \
            "$GITHUB_WORKSPACE/output/ari-functiongemma-${{ matrix.locale }}-q4_k_m.gguf" \
            "$GITHUB_WORKSPACE/${{ matrix.eval_file }}"

      - name: Store training SHAs
        if: steps.check.outputs.should_train == 'true' && github.event.inputs.experimental != 'true'
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          cat > /tmp/last-trained.json <<EOF
          {
            "engine_skills_sha": "${{ steps.check.outputs.engine_skills_sha }}",
            "skills_sha": "${{ steps.check.outputs.skills_sha }}",
            "locale": "${{ matrix.locale }}",
            "trained_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "workflow_run": "${{ github.run_id }}"
          }
          EOF
          modal volume put --force ari-functiongemma-output /tmp/last-trained.json "last-trained-${{ matrix.locale }}.json"

      - name: Publish floating manifest
        # DEVICE-FACING. English always; Italian only once vars.PROMOTE_IT is set —
        # this is the one step that puts a model where the app auto-updates from it.
        if: >-
          steps.check.outputs.should_train == 'true'
          && github.event.inputs.experimental != 'true'
          && (matrix.locale == 'en' || vars.PROMOTE_IT == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/publish_manifest.py functiongemma \
            --gguf output/ari-functiongemma-${{ matrix.locale }}-q4_k_m.gguf \
            --version "${{ steps.manifest.outputs.version }}" \
            --gguf-url "${{ steps.manifest.outputs.gguf_url }}" \
            --release-tag "functiongemma-${{ matrix.locale }}-latest"

      - name: Send email notification
        if: steps.check.outputs.should_train == 'true' && github.event.inputs.experimental != 'true'
        uses: dawidd6/action-send-mail@v5
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "FunctionGemma ${{ matrix.locale }} training complete"
          to: ${{ secrets.NOTIFICATION_EMAIL }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            FunctionGemma (${{ matrix.locale }}) training run completed.

            Engine skills SHA: ${{ steps.check.outputs.engine_skills_sha }}
            Community skills SHA: ${{ steps.check.outputs.skills_sha }}
            Workflow run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
